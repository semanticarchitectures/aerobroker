<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>AeroBroker — find a drone service that fits your job</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --bg: #f7f4ee;
    --bg-card: #ffffff;
    --ink: #2a2823;
    --ink-soft: #6b6760;
    --line: #e6e0d4;
    --accent: #1f4d8a;
    --accent-soft: #eef3fb;
    --bubble-user: #efe7d8;
    --provider-border: #d9d0c0;
  }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  .app {
    display: flex; flex-direction: column;
    max-width: 780px; margin: 0 auto;
    min-height: 100vh; padding: 0 16px;
  }
  header.top {
    display: flex; align-items: center; gap: 10px;
    padding: 18px 0 12px 0;
    border-bottom: 1px solid var(--line);
    position: sticky; top: 0; background: var(--bg); z-index: 10;
  }
  .logo { font-size: 20px; font-weight: 600; display:flex; align-items:center; gap:8px; }
  .tagline { color: var(--ink-soft); font-size: 12px; }
  .gear { margin-left: auto; background: transparent; border:0; color: var(--ink-soft); cursor: pointer; padding: 6px 8px; border-radius: 8px; font-size: 13px; }
  .gear:hover { background: #efe7d8; color: var(--ink); }

  main.chat {
    flex: 1; display: flex; flex-direction: column; gap: 18px;
    padding: 22px 0 24px 0;
  }
  .msg-row { display: flex; gap: 10px; }
  .msg-row.user { justify-content: flex-end; }
  .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 14px; background: #2a2823; color: #f7f4ee;
  }
  .bubble {
    max-width: 92%;
    padding: 2px 0; line-height: 1.55;
    color: var(--ink); font-size: 15px;
  }
  .bubble.user {
    background: var(--bubble-user); border-radius: 14px; padding: 10px 14px;
    max-width: 75%;
  }
  .bubble .meta { font-size: 11px; color: var(--ink-soft); margin-bottom: 4px; }

  .provider-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 10px; }
  @media (min-width: 600px) { .provider-grid.cols-2 { grid-template-columns: 1fr 1fr; } }
  .provider-card {
    background: var(--bg-card);
    border: 1px solid var(--provider-border);
    border-radius: 14px;
    padding: 12px 14px;
    box-shadow: 0 1px 2px rgba(0,0,0,.02);
    transition: border-color .15s, transform .1s;
  }
  .provider-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .provider-card .name { font-weight: 600; font-size: 14px; }
  .provider-card .blurb { font-size: 13px; color: var(--ink); margin-top: 4px; }
  .provider-card .chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .chip {
    font-size: 11px; padding: 1px 7px; border-radius: 999px;
    background: #f0ebe0; border: 1px solid var(--line); color: var(--ink);
  }
  .chip.cert { background: #eef3fb; border-color: #cfdded; color: var(--accent); }
  .chip.mode { background: #edf3ed; border-color: #cdddcd; color: #2f6f4a; }
  .provider-card .meta-line { font-size: 12px; color: var(--ink-soft); margin-top: 8px; }
  .provider-card .price { font-weight: 600; color: var(--accent); margin-top: 6px; font-size: 14px; }

  .assembly-card {
    background: var(--bg-card);
    border: 1px solid var(--accent);
    border-radius: 14px;
    padding: 14px;
    margin-top: 10px;
    box-shadow: 0 1px 4px rgba(31, 77, 138, .08);
  }
  .assembly-card .title { font-weight: 600; font-size: 14px; color: var(--accent); display: flex; align-items: center; gap: 6px; }
  .assembly-card .role-row { display: grid; grid-template-columns: 1fr auto; gap: 6px; padding: 8px 0; border-bottom: 1px dashed var(--line); }
  .assembly-card .role-row:last-of-type { border-bottom: 0; }
  .assembly-card .role-name { font-size: 12px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .03em; }
  .assembly-card .role-prov { font-size: 14px; }
  .assembly-card .role-line { font-size: 12px; color: var(--ink-soft); }
  .assembly-card .line-cost { font-size: 13px; color: var(--ink); text-align: right; }
  .assembly-card .total { display: flex; justify-content: space-between; padding-top: 10px; margin-top: 6px; border-top: 1px solid var(--line); font-weight: 600; }
  .assembly-card .why { font-size: 12px; color: var(--ink-soft); margin-top: 8px; background: var(--accent-soft); padding: 8px 10px; border-radius: 6px; }
  .assembly-card .alts { font-size: 12px; color: var(--ink-soft); margin-top: 8px; }
  .assembly-card .alt-row { padding: 4px 0; }

  .composer-wrap {
    position: sticky; bottom: 0; background: var(--bg);
    padding: 8px 0 16px 0; border-top: 1px solid transparent;
  }
  .composer {
    display: flex; gap: 8px; align-items: flex-end;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 10px 10px 10px 14px;
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
  }
  .composer:focus-within { border-color: var(--accent); }
  .composer textarea {
    flex: 1; resize: none; border: 0; outline: none; background: transparent;
    color: var(--ink); font: inherit; line-height: 1.5; max-height: 200px; padding: 4px 0;
  }
  .send {
    width: 32px; height: 32px; border-radius: 50%; background: var(--ink); color: #fff;
    border: 0; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .send:disabled { opacity: .4; cursor: not-allowed; }
  .disclaimer { text-align: center; color: var(--ink-soft); font-size: 11px; padding: 4px 0 0 0; }
  .typing-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--ink-soft); margin: 0 1px; animation: tdot 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: .15s; }
  .typing-dot:nth-child(3) { animation-delay: .3s; }
  @keyframes tdot { 0%,80%,100%{ transform: translateY(0); opacity:.3 } 40%{ transform: translateY(-3px); opacity:1 } }

  .modal { position: fixed; inset:0; background: rgba(0,0,0,.4); display:flex; align-items:center; justify-content:center; z-index:50; }
  .modal-card { background:#fff; border:1px solid var(--line); border-radius:14px; max-width: 540px; width: calc(100% - 32px); padding: 20px; color: var(--ink); }
  .modal-card label { font-size: 12px; color: var(--ink-soft); display: block; margin-bottom: 4px; margin-top: 12px; }
  .modal-card input, .modal-card textarea {
    width: 100%; padding: 8px 10px; border: 1px solid var(--line); border-radius: 8px; font: inherit; font-size: 13px; color: var(--ink); background: #fff;
  }
  .modal-card textarea { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; resize: vertical; }
  .modal-card .actions { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; }
  .btn { padding: 6px 14px; border-radius: 999px; border: 1px solid var(--line); background: #fff; color: var(--ink); cursor: pointer; font-size: 13px; }
  .btn-primary { background: var(--ink); color: #fff; border-color: var(--ink); }
  .err { background:#fff0f0; border:1px solid #f3c8c8; color:#9a1a1a; border-radius: 8px; padding: 8px 10px; font-size: 13px; }
</style>
</head>
<body>

<div class="app">
  <header class="top">
    <div>
      <div class="logo">🛰️ AeroBroker</div>
      <div class="tagline">Find the right drone service for your job</div>
    </div>
    <button class="gear" id="gear-btn" title="Advanced settings" aria-label="Settings">⚙</button>
  </header>

  <main class="chat" id="chat"></main>

  <div class="composer-wrap">
    <div class="composer">
      <textarea id="input" rows="1" placeholder="Tell me what you need inspected, monitored, or surveyed…" autofocus></textarea>
      <button id="send" class="send" title="Send" aria-label="Send">↑</button>
    </div>
    <div class="disclaimer">Prototype · mock provider catalog · responses generated by Claude</div>
  </div>
</div>

<div id="settings-modal" class="modal hidden">
  <div class="modal-card">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <div style="font-weight:600">Advanced settings</div>
      <button id="settings-close" class="btn">✕</button>
    </div>
    <p style="font-size:12px; color:var(--ink-soft); margin-top:8px">
      Most people don't need to change these. They're here if you want to re-point at a different proxy or tweak the broker's system prompt.
    </p>
    <label>Backend proxy URL</label>
    <input id="proxy-url" type="text" placeholder="https://..." autocomplete="off" />
    <label>Model</label>
    <input id="api-model" type="text" />
    <label>System prompt</label>
    <textarea id="system-prompt" rows="8"></textarea>
    <div class="actions">
      <button id="settings-reset" class="btn">Reset to defaults</button>
      <button id="settings-save"  class="btn btn-primary">Save</button>
    </div>
  </div>
</div>

<script>
// =====================================================================
// CONFIG
// =====================================================================
const DEFAULT_PROXY_URL = "https://aerobroker-proxy.kevin-g-kelly.workers.dev/v1/messages";
const DEFAULT_MODEL = "claude-sonnet-4-6";

// =====================================================================
// PROVIDER CATALOG — same 7 providers as the design-tool version
// =====================================================================
const CATALOG = [
  { id:"apex",       name:"Apex Tower Pros",
    blurb:"Telecom tower specialist. Drone + climber crews, RAD/RF inspection reports.",
    capabilities:["visual 4K","thermal","RF scan"],
    certifications:["FAA Part 107"],
    specialties:["towers","monopole","self-support"],
    serviceModes:["full-stack"], geography:["TX","OK","NM","AR"],
    pricing:{ unit:"tower", low:600, high:1200 },
    capacity:"Up to 30 towers/month per region" },

  { id:"skyguard",   name:"SkyGuard Inspections",
    blurb:"Generalist Part-107 collector. Reliable visual + thermal capture on small assets.",
    capabilities:["visual 4K","thermal"],
    certifications:["FAA Part 107"],
    specialties:["towers","bridges","substations","small assets"],
    serviceModes:["collection","full-stack"], geography:["TX","OK","LA","national-on-quote"],
    pricing:{ unit:"asset", low:400, high:900 },
    capacity:"High — 200+ assets/mo via subcontractors" },

  { id:"bridgeview", name:"BridgeView Drone Co",
    blurb:"Bridge specialist. Photogrammetry, 3D models, PE-stamped engineering reports.",
    capabilities:["visual 4K/8K","photogrammetry","LiDAR-light"],
    certifications:["FAA Part 107","PE-stamped reports"],
    specialties:["bridges","overpasses","dam infrastructure"],
    serviceModes:["full-stack"], geography:["national"],
    pricing:{ unit:"bridge", low:2500, high:5000 },
    capacity:"3–6 weeks scheduling lead" },

  { id:"highline",   name:"HighLine Aerial",
    blurb:"Premium BVLOS operator. Long-corridor transmission flights with thermal + LiDAR.",
    capabilities:["visual 4K","thermal","LiDAR","multispectral"],
    certifications:["FAA Part 107","BVLOS waiver","night ops"],
    specialties:["transmission lines","long corridor"],
    serviceModes:["collection"], geography:["national"],
    pricing:{ unit:"mile", low:1800, high:2500 },
    capacity:"Books 2–3 months out" },

  { id:"volt",       name:"Volt Drone Services",
    blurb:"Distribution & transmission line collector. No BVLOS but cost-effective per mile.",
    capabilities:["visual 4K","thermal"],
    certifications:["FAA Part 107"],
    specialties:["transmission lines","distribution lines"],
    serviceModes:["collection"], geography:["TX","NM","CO","KS","NE","OK"],
    pricing:{ unit:"mile", low:900, high:1400 },
    capacity:"60–80 mi/wk per crew, multiple crews" },

  { id:"aeroprocess",name:"AeroProcess AI",
    blurb:"Processing-only. AI defect detection, thermal anomaly classification, 3D reconstruction.",
    capabilities:["AI defect detection","thermal anomaly","photogrammetry","report gen"],
    certifications:["SOC 2"],
    specialties:["processing","analytics"],
    serviceModes:["processing"], geography:["any"],
    pricing:{ unit:"image", low:0.4, high:2.0 },
    capacity:"Elastic" },

  { id:"geodata",    name:"GeoData Solutions",
    blurb:"Survey-grade LiDAR + GIS deliverables. Strong on precise spatial outputs.",
    capabilities:["LiDAR","photogrammetry","GIS delivery","report gen"],
    certifications:["FAA Part 107","PLS-licensed"],
    specialties:["bridges","corridors","GIS processing"],
    serviceModes:["processing","full-stack"], geography:["national"],
    pricing:{ unit:"asset", low:1200, high:2500 },
    capacity:"Moderate" }
];

// =====================================================================
// WELCOME + SYSTEM PROMPT
// =====================================================================
const WELCOME = `Hi — I'm AeroBroker. I help match commercial drone work to the right service providers.

Most clients come to me knowing the OUTCOME they want — "we need annual inspection of these 40 bridges with stamped engineering reports" — but not the technical spec or which providers can deliver it inside their budget. My job is to bridge that.

Tell me what you need to inspect, monitor, or survey, and we'll work through it together.`;

function defaultSystemPrompt() {
  return `You are AeroBroker, a commercial drone-services broker that sits between consumers (corporations, governments, individuals) and a network of drone service providers.

Your job, in order:
1. **Elicit** the consumer's outcome — what they want delivered, not how. Ask one focused question at a time.
2. **Translate** that outcome into technical requirements: asset type, count, location, frequency, sensors needed, accuracy/resolution, deliverables, regulatory needs (BVLOS, restricted airspace, certifications, PE stamps), budget, timeline.
3. **Match** against the provider catalog. Explain trade-offs honestly. Some jobs need ONE provider (full-stack); some need a COLLECTOR + PROCESSOR split; some need multiple collectors for different sections of a corridor + one processor.
4. **Propose** a job assembly with line-item pricing and at least one alternative when the trade-off is meaningful.

Tone: warm, expert, low-pressure. Like a thoughtful procurement consultant, not a sales chatbot. Avoid jargon walls — explain what BVLOS or photogrammetry means if the user seems non-technical. Distinguish "what we need to know to quote" vs. "nice to have."

When you want the page to surface provider cards inline below your message, append a block on its own line:
<PROVIDERS>apex,skyguard,bridgeview</PROVIDERS>
Use only valid provider IDs. Do NOT repeat the catalog details in prose — let the cards do that. Include a short reasoning line BEFORE the block ("Three providers worth considering for this work:").

When you want to propose a job assembly inline, emit:
<ASSEMBLY>{
  "title": "string",
  "roles": [ { "role": "Collection", "providerId": "highline", "line": "60 mi BVLOS × $2,200 = $132,000", "cost": "$132,000" } ],
  "total": "$328,320  ·  inside budget envelope",
  "timeline": "string",
  "why": "string",
  "alternatives": [ { "label": "string", "cost": "string", "note": "string" } ]
}</ASSEMBLY>

The JSON must parse. Surface an assembly only after the requirements are firm enough that the quote is meaningful.

Available provider IDs: ${CATALOG.map(p => p.id).join(", ")}.`;
}

// =====================================================================
// STATE
// =====================================================================
const STORAGE_KEY = "aerobroker_consumer_settings_v1";

let state = {
  messages: [],
  proxyUrl: DEFAULT_PROXY_URL,
  model: DEFAULT_MODEL,
  systemPrompt: defaultSystemPrompt(),
  inFlight: false
};
loadSettings();

function loadSettings() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const obj = JSON.parse(raw);
      if (obj.proxyUrl)     state.proxyUrl = obj.proxyUrl;
      if (obj.model)        state.model = obj.model;
      if (obj.systemPrompt) state.systemPrompt = obj.systemPrompt;
    }
  } catch {}
}
function saveSettings() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      proxyUrl: state.proxyUrl, model: state.model, systemPrompt: state.systemPrompt
    }));
  } catch {}
}

// =====================================================================
// HELPERS
// =====================================================================
const $ = id => document.getElementById(id);
const fmtMoney = n => (n == null) ? "" : "$" + Number(n).toLocaleString();
function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function providerById(id) { return CATALOG.find(p => p.id === id); }

// Render assistant text, splitting out <PROVIDERS> and <ASSEMBLY> blocks
function renderAssistantContent(text) {
  text = text.replace(/<UPDATE>[\s\S]*?<\/UPDATE>/g, "").trim();

  const tokenRe = /<(PROVIDERS|ASSEMBLY)>([\s\S]*?)<\/\1>/g;
  const parts = [];
  let lastIdx = 0, m;
  while ((m = tokenRe.exec(text)) !== null) {
    if (m.index > lastIdx) parts.push({ kind:"text", text: text.slice(lastIdx, m.index) });
    parts.push({ kind: m[1].toLowerCase(), body: m[2] });
    lastIdx = m.index + m[0].length;
  }
  if (lastIdx < text.length) parts.push({ kind:"text", text: text.slice(lastIdx) });

  let html = "";
  for (const p of parts) {
    if (p.kind === "text") {
      const t = p.text.trim();
      if (t) html += `<div style="white-space:pre-wrap; margin-bottom:6px">${escapeHtml(t)}</div>`;
    } else if (p.kind === "providers") {
      html += renderProviderCards(p.body);
    } else if (p.kind === "assembly") {
      html += renderAssemblyCard(p.body);
    }
  }
  return html;
}

function renderProviderCards(body) {
  const ids = body.split(/[\s,]+/).map(s => s.trim()).filter(Boolean);
  const valid = ids.map(providerById).filter(Boolean);
  if (valid.length === 0) return "";
  const cols = valid.length >= 2 ? "cols-2" : "";
  let html = `<div class="provider-grid ${cols}">`;
  for (const p of valid) {
    const priceStr = p.pricing
      ? `${fmtMoney(p.pricing.low)}–${fmtMoney(p.pricing.high)} / ${escapeHtml(p.pricing.unit)}`
      : "—";
    const caps = (p.capabilities||[]).map(c => `<span class="chip">${escapeHtml(c)}</span>`).join("");
    const certs = (p.certifications||[]).map(c => `<span class="chip cert">${escapeHtml(c)}</span>`).join("");
    const modes = (p.serviceModes||[]).map(c => `<span class="chip mode">${escapeHtml(c)}</span>`).join("");
    html += `
      <div class="provider-card">
        <div class="name">${escapeHtml(p.name)}</div>
        <div class="blurb">${escapeHtml(p.blurb)}</div>
        <div class="chips">${caps}${certs}${modes}</div>
        <div class="price">${priceStr}</div>
        <div class="meta-line">${escapeHtml((p.geography||[]).join(", "))} · ${escapeHtml(p.capacity||"")}</div>
      </div>`;
  }
  html += `</div>`;
  return html;
}

function renderAssemblyCard(body) {
  let obj;
  try { obj = JSON.parse(body.trim()); }
  catch { return `<div class="assembly-card"><div class="why">Could not parse job assembly from the broker.</div></div>`; }
  const roles = Array.isArray(obj.roles) ? obj.roles : [];
  const alts = Array.isArray(obj.alternatives) ? obj.alternatives : [];

  const roleRows = roles.map(r => {
    const provName = r.providerId ? (providerById(r.providerId)?.name || r.providerId) : (r.provider || "");
    return `
      <div class="role-row">
        <div>
          <div class="role-name">${escapeHtml(r.role || "")}</div>
          <div class="role-prov">${escapeHtml(provName)}</div>
          <div class="role-line">${escapeHtml(r.line || "")}</div>
        </div>
        <div class="line-cost">${escapeHtml(r.cost || "")}</div>
      </div>`;
  }).join("");

  const altsHtml = alts.length === 0 ? "" : `
    <div class="alts">
      <div style="font-weight:600; color:var(--ink); margin-bottom:4px">Alternatives</div>
      ${alts.map(a => `<div class="alt-row"><b>${escapeHtml(a.label||"")}</b> · ${escapeHtml(a.cost||"")}<br><span style="color:var(--ink-soft)">${escapeHtml(a.note||"")}</span></div>`).join("")}
    </div>`;

  return `
    <div class="assembly-card">
      <div class="title">📦 Proposed job assembly${obj.title ? ` · ${escapeHtml(obj.title)}` : ""}</div>
      ${roleRows}
      <div class="total"><span>Total</span><span>${escapeHtml(obj.total||"")}</span></div>
      ${obj.timeline ? `<div class="meta-line" style="margin-top:6px"><b>Timeline:</b> ${escapeHtml(obj.timeline)}</div>` : ""}
      ${obj.why ? `<div class="why"><b>Why this:</b> ${escapeHtml(obj.why)}</div>` : ""}
      ${altsHtml}
    </div>`;
}

// =====================================================================
// RENDER
// =====================================================================
function renderChat() {
  const el = $("chat");
  el.innerHTML = "";
  el.appendChild(buildAssistantRow(WELCOME));

  for (const m of state.messages) {
    if (m.role === "user") {
      const row = document.createElement("div");
      row.className = "msg-row user";
      row.innerHTML = `<div class="bubble user"><div>${escapeHtml(m.text)}</div></div>`;
      el.appendChild(row);
    } else if (m.role === "assistant") {
      el.appendChild(buildAssistantRow(m.text, true));
    } else if (m.role === "thinking") {
      const row = document.createElement("div");
      row.className = "msg-row";
      row.innerHTML = `<div class="avatar">A</div><div class="bubble"><div class="meta">AeroBroker</div><div><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div></div>`;
      el.appendChild(row);
    } else if (m.role === "error") {
      const row = document.createElement("div");
      row.className = "msg-row";
      row.innerHTML = `<div class="avatar">!</div><div class="bubble"><div class="err">${escapeHtml(m.text)}</div></div>`;
      el.appendChild(row);
    }
  }
  try { window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" }); } catch {}
}

function buildAssistantRow(text, renderRich = false) {
  const row = document.createElement("div");
  row.className = "msg-row";
  const inner = renderRich ? renderAssistantContent(text) : `<div style="white-space:pre-wrap">${escapeHtml(text)}</div>`;
  row.innerHTML = `<div class="avatar">A</div><div class="bubble"><div class="meta">AeroBroker</div>${inner}</div>`;
  return row;
}

// =====================================================================
// SEND
// =====================================================================
async function send() {
  if (state.inFlight) return;
  const input = $("input");
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  autosizeInput();
  state.messages.push({ role: "user", text });
  state.messages.push({ role: "thinking" });
  state.inFlight = true;
  $("send").disabled = true;
  renderChat();

  const history = state.messages
    .filter(m => m.role === "user" || m.role === "assistant")
    .map(m => ({ role: m.role, content: m.text }));

  const fullSystemPrompt = state.systemPrompt
    + "\n\n# PROVIDER CATALOG\n" + JSON.stringify(CATALOG, null, 2);

  let replyText = "";
  try {
    const resp = await fetch(state.proxyUrl, {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({
        model: state.model,
        max_tokens: 1800,
        system: fullSystemPrompt,
        messages: history
      })
    });
    if (!resp.ok) {
      const t = await resp.text();
      let parsed = null; try { parsed = JSON.parse(t); } catch {}
      throw new Error(friendlyError(resp.status, parsed?.error || t));
    }
    const data = await resp.json();
    replyText = (data.content || []).filter(c => c.type === "text").map(c => c.text).join("\n");
  } catch (e) {
    state.messages = state.messages.filter(m => m.role !== "thinking");
    state.messages.push({ role: "error", text: e.message });
    state.inFlight = false;
    $("send").disabled = false;
    renderChat();
    return;
  }

  state.messages = state.messages.filter(m => m.role !== "thinking");
  state.messages.push({ role: "assistant", text: replyText || "(no reply)" });
  state.inFlight = false;
  $("send").disabled = false;
  renderChat();
}

function friendlyError(status, raw) {
  if (status === 429) return "I've hit my daily message limit for this device. Please come back tomorrow — sorry about that.";
  if (status === 503) return "I've reached today's overall limit across everyone using this prototype. Try again tomorrow.";
  if (status === 403) return "I can't be reached from this page right now (origin not allowed). If you're the site owner, check the proxy's ALLOWED_ORIGINS.";
  if (status >= 500) return "I had trouble reaching my brain. Please try again in a moment.";
  return "Something went wrong: " + (raw || "unknown error");
}

// =====================================================================
// SETTINGS
// =====================================================================
function openSettings() {
  $("proxy-url").value = state.proxyUrl;
  $("api-model").value = state.model;
  $("system-prompt").value = state.systemPrompt;
  $("settings-modal").classList.remove("hidden");
}
function closeSettings() { $("settings-modal").classList.add("hidden"); }
function saveSettingsFromUI() {
  state.proxyUrl = $("proxy-url").value.trim() || DEFAULT_PROXY_URL;
  state.model = $("api-model").value.trim() || DEFAULT_MODEL;
  state.systemPrompt = $("system-prompt").value || defaultSystemPrompt();
  saveSettings();
  closeSettings();
}
function resetSettings() {
  state.proxyUrl = DEFAULT_PROXY_URL;
  state.model = DEFAULT_MODEL;
  state.systemPrompt = defaultSystemPrompt();
  try { localStorage.removeItem(STORAGE_KEY); } catch {}
  openSettings();
}

function autosizeInput() {
  const el = $("input");
  el.style.height = "auto";
  el.style.height = Math.min(200, el.scrollHeight) + "px";
}

// =====================================================================
// INIT
// =====================================================================
function init() {
  $("gear-btn").addEventListener("click", openSettings);
  $("settings-close").addEventListener("click", closeSettings);
  $("settings-save").addEventListener("click", saveSettingsFromUI);
  $("settings-reset").addEventListener("click", resetSettings);

  $("send").addEventListener("click", send);
  $("input").addEventListener("input", autosizeInput);
  $("input").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  renderChat();
}

init();
</script>
</body>
</html>
